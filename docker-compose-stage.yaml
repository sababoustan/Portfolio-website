services:
  db:
    image: postgres:16
    container_name: gexyshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  web:
    build: .
    container_name: gexyshop_web
    env_file:
    - .env
    restart: unless-stopped
    command: gunicorn gexyshop.wsgi:application --bind 0.0.0.0:8000
    depends_on:
      - db
      - redis
    environment:
      IS_DOCKER: "true"
    volumes:
    - .:/app
    - static_volume:/app/static
    - media_data:/app/media
    ports:
      - "8000:8000"

  master:
    image: locustio/locust
    ports:
     - "8089:8089"
    volumes:
      - ./:/mnt/locust
    command: -f /mnt/locust/locustfile.py --master -H http://web:8000
  
  worker:
    image: locustio/locust
    volumes:
      - ./:/mnt/locust
    command: -f /mnt/locust/locustfile.py --worker --master-host master

  redis:
    image: redis:7
    container_name: gexyshop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A gexyshop worker -l info
    env_file:
    - .env
    environment:
      IS_DOCKER: "true"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app


  celery-beat:
    build: . 
    command: celery -A gexyshop beat -l info
    env_file:
    - .env
    environment:
      IS_DOCKER: "true"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  nginx:
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
    - ./default.conf:/etc/nginx/conf.d/default.conf
    - static_volume:/app/staticfiles
    - media_data:/app/media
    depends_on:
      - web


volumes:
  postgres_data:
  static_volume:
  media_data:
    
