{% extends 'base.html' %}
{% load static %}
{% block title %}لیست علاقه مندی ها{% endblock %}

	<!--=======  breadcrumb area =======-->

	<div class="breadcrumb-area breadcrumb-bg-1 pt-50 pb-70 mb-130">

			<div class="row">
				<div class="col-lg-12">
					<h1 class="breadcrumb-title">لیست علاقه مندیها</h1>

 {% endblock %}
