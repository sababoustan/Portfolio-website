{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard(Dark Mode)</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom css -->
    <link rel="stylesheet" href="{% static 'assets/css/dashboard_managment.css' %}">


</head>
<body>

    <div class="container-fluid py-5">

        <div class="top-bar d-flex justify-content-between align-items-center">
            <h1 class="dashboard-title">Management Dashboard(dark mode)📊</h1>
        </div>

        <div class="chart-container">
            <h2 class="chart-title">Monthly Sales</h2>
            <img src="/media/charts/monthly_sales.png" class="chart" alt="Monthly Sales Chart">
        </div>

        <div class="chart-container">
            <h2 class="chart-title">Daily Sales</h2>
            <img src="/media/charts/daily_sales.png" class="chart" alt="Daily Sales Chart">
        </div>

        <div class="chart-container">
            <h2 class="chart-title">Best‑Selling Products</h2>
            <img src="/media/charts/best_selling.png" class="chart" alt="Best Selling Products">
        </div>

        <div class="chart-container">
            <h2 class="chart-title">Stock Inventory</h2>
            <img src="/media/charts/stock_levels.png" class="chart" alt="Stock Levels">
        </div>

    </div>

</body>
</html>
