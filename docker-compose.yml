services:
  db:
    image: postgres:16
    container_name: gexyshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  web:
    build: .
    container_name: gexyshop_web
    environment:
      IS_DOCKER : "true"
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"

  redis:
    image: redis:7
    container_name: gexyshop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  media_data:
